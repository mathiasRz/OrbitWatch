spring.application.name=OrbitWatch
server.port=8080

# Profil actif
spring.profiles.active=dev

# Fichier de secrets local — contient les credentials SpaceTrack, etc.
spring.config.import=optional:classpath:application-secrets.properties

# JPA / PostgreSQL (prod)
# Ces valeurs sont surchargees par application-dev.properties en mode dev
spring.datasource.url=jdbc:postgresql://localhost:5432/orbitwatch
spring.datasource.username=orbitwatch
spring.datasource.password=orbitwatch
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ── TleService ────────────────────────────────────────────────────────────────
# URL CelesTrak GP — le %s sera remplacé par le nom du catalogue
tle.celestrak.base-url=https://celestrak.org/NORAD/elements/gp.php?GROUP=%s&FORMAT=tle
# Catalogues à charger au démarrage (séparés par des virgules)
tle.celestrak.catalogs=stations
# Délai entre chaque refresh automatique (en ms) — défaut : 6 heures
tle.refresh.delay-ms=21600000

# ── Space-Track.org (fallback si CelesTrak est indisponible) ──────────────────
# Activer le fallback en passant tle.spacetrack.enabled=true
tle.spacetrack.enabled=true

# ── OrbitalHistoryJob ─────────────────────────────────────────────────────────
# Rétention des snapshots orbitaux (en jours) — purge TTL à chaque fetch
orbital.history.retention-days=90

# ── AnomalyDetectionService — seuils Phase 1 (règles métier) ─────────────────
anomaly.threshold.altitude-km=10.0
anomaly.threshold.inclination-deg=0.5
anomaly.threshold.raan-deg=1.0
anomaly.threshold.eccentricity=0.001

# ── AnomalyScanJob ────────────────────────────────────────────────────────────
anomaly.scan.enabled=true
anomaly.scan.delay-ms=3600000

# ── AnomalyDetectionService — Phase 2 Z-score ─────────────────────────────────
anomaly.ml.zscore-threshold=3.0
anomaly.ml.min-history=30

