spring.application.name=OrbitWatch
server.port=8080

# Profil actif
spring.profiles.active=dev

# Fichier de secrets local — contient les credentials SpaceTrack, etc.
spring.config.import=optional:classpath:application-secrets.properties

# JPA / PostgreSQL (prod)
# Ces valeurs sont surchargees par application-dev.properties en mode dev
spring.datasource.url=jdbc:postgresql://localhost:5432/orbitwatch
spring.datasource.username=orbitwatch
spring.datasource.password=orbitwatch
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ── TleService ────────────────────────────────────────────────────────────────
# URL CelesTrak GP — le %s sera remplacé par le nom du catalogue
tle.celestrak.base-url=https://celestrak.org/NORAD/elements/gp.php?GROUP=%s&FORMAT=tle
# Catalogues standards à charger via FetchTleJob (groupes CelesTrak valides)
# "debris" n'est pas un groupe CelesTrak valide — géré séparément par FetchDebrisTleJob
tle.celestrak.catalogs=stations
# Délai entre chaque refresh automatique (en ms) — défaut : 6 heures
tle.refresh.delay-ms=21600000

# ── Catalogue débris — FetchDebrisTleJob ──────────────────────────────────────
# Fusionne ces 3 groupes CelesTrak sous l'alias logique "debris" en mémoire.
#   fengyun-1c-debris  : ASAT chinois 2007, ~3 000 fragments, ~800 km / 98°
#   iridium-33-debris  : Collision 2009, ~600 fragments, ~780 km / 86°
#   cosmos-2251-debris : Collision 2009 (autre satellite), ~1 500 fragments
# Désactiver avec tle.debris.enabled=false (ex : env sans accès CelesTrak)
tle.debris.enabled=true
tle.debris.sources=fengyun-1c-debris,iridium-33-debris,cosmos-2251-debris

# ── Space-Track.org (fallback si CelesTrak est indisponible) ──────────────────
# Activer le fallback en passant tle.spacetrack.enabled=true
tle.spacetrack.enabled=true

# ── OrbitalHistoryJob ─────────────────────────────────────────────────────────
# Rétention des snapshots orbitaux (en jours) — purge TTL à chaque fetch
orbital.history.retention-days=90

# ── AnomalyDetectionService — seuils Phase 1 (règles métier) ─────────────────
anomaly.threshold.altitude-km=10.0
anomaly.threshold.inclination-deg=0.5
# Seuil RAAN : la précession nodale naturelle d'une orbite LEO est ~2–7°/jour
# soit ~0.5–1.75° par fetch de 6h. On fixe 2.0° pour ne capturer que les
# dérives anormales (manœuvres, perturbations atmosphériques) et éviter les
# faux positifs sur ISS/Soyuz/Progress qui partagent le même plan orbital.
anomaly.threshold.raan-deg=2.0
anomaly.threshold.eccentricity=0.001

# ── AnomalyScanJob ────────────────────────────────────────────────────────────
anomaly.scan.enabled=true
anomaly.scan.delay-ms=3600000

# ── AnomalyDetectionService — Phase 2 Z-score ─────────────────────────────────
anomaly.ml.zscore-threshold=3.0
anomaly.ml.min-history=30

# ── Spring AI / LLM ───────────────────────────────────────────────────────────
# Modèles disponibles (changer selon votre machine) :
#   Avec GPU  : llama3.2, mistral, gemma3:4b
#   Sans GPU  : qwen2.5:1.5b, gemma3:1b, qwen2.5:0.5b
spring.ai.ollama.chat.model=llama3.2
spring.ai.ollama.embedding.model=nomic-embed-text

# ── PgVector store ────────────────────────────────────────────────────────────
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.index-type=HNSW
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE
spring.ai.vectorstore.pgvector.initialize-schema=false

# ── RAG — ingestion ───────────────────────────────────────────────────────────
rag.ingestion.enabled=true
rag.ingestion.catalogs=stations,active
rag.sse.timeout-ms=120000

# ── Garde-fous volume ──────────────────────────────────────────────────────
orbital.history.catalogs.exclude=debris
conjunction.scan.catalogs=stations,active

