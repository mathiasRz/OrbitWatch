# Profil de test : H2 en mémoire, jobs désactivés
spring.datasource.url=jdbc:h2:mem:orbitwatch-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# Désactiver le ConjunctionScanJob en test
conjunction.scan.enabled=false

# Désactiver l'AnomalyScanJob en test
anomaly.scan.enabled=false

# Désactiver le fetch TLE en test
tle.celestrak.catalogs=

# Désactiver le chargement des débris en test (évite les appels HTTP CelesTrak)
tle.debris.enabled=false

# OrbitalHistoryJob — rétention courte en test (évite les purges inattendues)
orbital.history.retention-days=90

# ── Spring AI / PgVector — désactivés en test (H2 ne supporte pas pgvector) ──
spring.autoconfigure.exclude=\
  org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration
rag.ingestion.enabled=false

