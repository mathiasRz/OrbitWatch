<form [formGroup]="form" (ngSubmit)="onSubmit()" class="tle-form">
  <h2>Paramètres de propagation</h2>

  <div class="field">
    <label for="name">Satellite</label>

    @if (namesLoading()) {
      <div class="names-state">Chargement du catalogue…</div>
    } @else if (namesError()) {
      <div class="names-state error">{{ namesError() }}</div>
    } @else {
      <select id="name" formControlName="name" [attr.disabled]="loading() || null">
        @for (sat of satelliteNames(); track sat) {
          <option [value]="sat">{{ sat }}</option>
        }
      </select>
      @if (f['name'].invalid && f['name'].touched) {
        <span class="error">Veuillez sélectionner un satellite.</span>
      }
    }
  </div>

  <div class="row">
    <div class="field">
      <label for="duration">Durée (min)</label>
      <input id="duration" type="number" formControlName="duration" min="1" max="1440" [attr.disabled]="loading() || null" />
    </div>
    <div class="field">
      <label for="step">Pas (s)</label>
      <input id="step" type="number" formControlName="step" min="10" max="300" [attr.disabled]="loading() || null" />
    </div>
  </div>

  <button type="submit" [disabled]="form.invalid || loading() || namesLoading()">
    {{ loading() ? 'Calcul…' : 'Propager' }}
  </button>
</form>
