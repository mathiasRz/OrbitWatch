<div class="map-live-wrapper">
  <!-- Barre de statut -->
  <div class="status-bar">
    @if (loading) {
      <span class="status-loading">⏳ Chargement...</span>
    } @else if (error) {
      <span class="status-error">⚠ {{ error }}</span>
    } @else {
      <span class="status-ok">
        🛰 {{ satelliteCount }} satellites
        &nbsp;·&nbsp;
        Mis à jour : {{ lastRefresh | date:'HH:mm:ss' }}
        &nbsp;·&nbsp;
        <span class="refresh-hint">rafraîchi toutes les 60 s</span>
      </span>
    }

    <!-- Toggle heatmap débris -->
    <button
      class="heatmap-toggle"
      [class.active]="heatmapActive"
      [disabled]="heatmapLoading"
      (click)="toggleHeatmap()"
      title="Afficher/masquer la densité des débris spatiaux">
      @if (heatmapLoading) {
        ⏳
      } @else if (heatmapActive) {
         Heatmap ON
      } @else {
         Heatmap débris
      }
    </button>
  </div>

  <!-- Carte Leaflet -->
  <div #mapContainer class="map-container"></div>
</div>
